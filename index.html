<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
 <title>Calculadora</title>
</head>
<body>
  <h1>Calculadora</h1>
  <div class="calculadora">
  
 <input type="number" id="num1" 
 placeholder="Insira o primeiro valor">
 
 <input type="number" id="num2" 
 placeholder="Insira o segundo valor">
 
 <p>Resultado: <span id="resultado">0</span></p>
 <div class="botoes">
 <button onclick="calcular('soma')">+</button>
 <button onclick="calcular('sub')">-</button>
 <button onclick="calcular('mult')">×</button>
 <button onclick="calcular('div')">÷</button>
 </div>
</div>
<script src="script.js"></script>
</body>
</html>
